<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏍️ 查理二世 - 产品工作站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 15px;
            color: #fff;
        }
        .header {
            text-align: center;
            padding: 20px 0;
        }
        .header h1 { font-size: 1.8em; margin-bottom: 5px; }
        .header p { color: #888; font-size: 0.9em; }
        .logo { font-size: 2.5em; margin-bottom: 10px; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
        }
        .stat-number { font-size: 2em; font-weight: bold; }
        .stat-label { color: #aaa; font-size: 0.8em; margin-top: 5px; }
        
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .column {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 12px;
        }
        .column-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 2px solid;
        }
        .column.pending { border-color: #ffc107; }
        .column.progress { border-color: #2196f3; }
        .column.done { border-color: #4caf50; }
        
        .column-title { font-size: 1em; font-weight: bold; }
        
        .task {
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            border-left: 3px solid;
        }
        .task.pending { border-color: #ffc107; }
        .task.progress { border-color: #2196f3; }
        .task.done { border-color: #4caf50; }
        
        .task-title { font-weight: 600; font-size: 0.9em; margin-bottom: 5px; }
        .task-meta { font-size: 0.75em; color: #888; display: flex; justify-content: space-between; }
        
        .empty-state {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.85em;
        }
        
        .refresh-info {
            text-align: center;
            color: #666;
            font-size: 0.75em;
            margin-top: 15px;
            padding: 10px;
        }
        
        .status-bar {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85em;
        }
        .status-item { display: flex; align-items: center; gap: 5px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-dot.green { background: #4caf50; }
        .status-dot.yellow { background: #ffc107; }
        
        @media (max-width: 768px) {
            .board { grid-template-columns: 1fr; }
            .stats { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🏍️</div>
        <h1>查理二世 - 产品工作站</h1>
        <p>摩托车装备项目管理系统</p>
    </div>
    
    <div class="status-bar">
        <div class="status-item">
            <span class="status-dot green"></span>
            <span>网关: 已连接</span>
        </div>
        <div class="status-item">
            <span class="status-dot green"></span>
            <span>飞书: 已连接</span>
        </div>
        <div class="status-item">
            <span id="update-time">--:--:--</span>
        </div>
    </div>
    
    <div class="stats">
        <div class="stat-card">
            <div class="stat-number" id="total">0</div>
            <div class="stat-label">总任务</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="pending-count">0</div>
            <div class="stat-label">待处理</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="progress-count">0</div>
            <div class="stat-label">进行中</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="done-count">0</div>
            <div class="stat-label">已完成</div>
        </div>
    </div>
    
    <div class="board">
        <div class="column pending">
            <div class="column-header">
                <span class="column-title">📋 待处理</span>
            </div>
            <div id="pending-tasks">
                <div class="empty-state">暂无任务</div>
            </div>
        </div>
        
        <div class="column progress">
            <div class="column-header">
                <span class="column-title">🔄 进行中</span>
            </div>
            <div id="progress-tasks">
                <div class="empty-state">暂无任务</div>
            </div>
        </div>
        
        <div class="column done">
            <div class="column-header">
                <span class="column-title">✅ 已完成</span>
            </div>
            <div id="done-tasks">
                <div class="empty-state">暂无任务</div>
            </div>
        </div>
    </div>
    
    <div class="refresh-info">
        每 10 秒自动刷新 · <span id="last-update">--</span>
    </div>
    
    <script>
        const TASKS_URL = 'https://raw.githubusercontent.com/Chales-Yu/Charles-II-Workstation/main/tasks.json';
        
        async function loadTasks() {
            try {
                const response = await fetch(TASKS_URL);
                const data = await response.json();
                render(data.tasks || []);
                document.getElementById('last-update').textContent = '数据更新于 ' + new Date().toLocaleTimeString();
            } catch (e) {
                // 如果获取失败，显示本地缓存
                console.log('无法从GitHub获取，使用本地数据');
                loadLocalTasks();
            }
        }
        
        function loadLocalTasks() {
            // 备用：本地数据
            const tasks = [
                { id: 1, title: "搭建产品工作站架构", agent: "产品经理", status: "done", time: "15:45" },
                { id: 2, title: "创建任务可视化看板", agent: "产品经理", status: "done", time: "15:50" }
            ];
            render(tasks);
        }
        
        function render(tasks) {
            const pending = tasks.filter(t => t.status === 'pending');
            const progress = tasks.filter(t => t.status === 'progress');
            const done = tasks.filter(t => t.status === 'done');
            
            document.getElementById('total').textContent = tasks.length;
            document.getElementById('pending-count').textContent = pending.length;
            document.getElementById('progress-count').textContent = progress.length;
            document.getElementById('done-count').textContent = done.length;
            
            renderColumn('pending-tasks', pending);
            renderColumn('progress-tasks', progress);
            renderColumn('done-tasks', done);
            
            document.getElementById('update-time').textContent = new Date().toLocaleTimeString();
        }
        
        function renderColumn(id, taskList) {
            const el = document.getElementById(id);
            if (taskList.length === 0) {
                el.innerHTML = '<div class="empty-state">暂无任务</div>';
                return;
            }
            el.innerHTML = taskList.map(t => `
                <div class="task ${t.status}">
                    <div class="task-title">${t.title}</div>
                    <div class="task-meta">
                        <span>${t.agent}</span>
                        <span>${t.time}</span>
                    </div>
                </div>
            `).join('');
        }
        
        // 每10秒刷新
        loadTasks();
        setInterval(loadTasks, 10000);
    </script>
</body>
</html>
